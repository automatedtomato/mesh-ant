<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MeshAnt</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <!-- Observer gate: visible on load; the ONLY thing shown until observer is named.
       Every graph is a positioned reading — the UI enforces this structurally. -->
  <header id="observer-gate">
    <form id="observer-form">
      <label for="observer-input">Observer position — every graph is a positioned reading</label>
      <div id="observer-input-row">
        <input id="observer-input" type="text" placeholder="e.g. alice" autocomplete="off" required>
        <button type="submit">Load graph</button>
      </div>
      <!-- Populated by app.js on load; shows available observer positions. -->
      <div id="observer-hints" hidden>
        <span class="observer-hints-label">Available:</span>
        <span id="observer-chips"></span>
      </div>
    </form>
    <div id="error-banner" hidden></div>
  </header>

  <!-- Cut header: permanent metadata bar shown after observer is committed.
       Observer, window, trace/shadow counts, and export buttons.
       Cannot be dismissed — every representation names its cut. -->
  <div id="cut-header" hidden>
    <span id="cut-observer"></span>
    <span class="cut-sep">|</span>
    <span id="cut-window"></span>
    <span class="cut-sep">|</span>
    <span id="cut-tags"></span>
    <span class="cut-sep">|</span>
    <span id="cut-trace-count"></span>
    <span class="cut-sep">|</span>
    <span id="cut-shadow-count"></span>
    <div id="cut-export">
      <button id="btn-export-json">Export JSON</button>
      <button id="btn-export-dot">Export DOT</button>
    </div>
  </div>

  <!-- Time window picker: visible after observer is committed.
       Sits between the cut header and main layout so it reads as part of the cut
       definition — the time window is a parameter of the positioned reading, not
       a navigation control. Disabled/hidden before observer commit (observer gate
       pattern). -->
  <div id="time-window-picker" hidden>
    <span class="time-window-label">Time window</span>
    <label for="time-from" class="time-window-field-label">From</label>
    <input id="time-from" type="datetime-local" title="From (UTC assumed)">
    <label for="time-to" class="time-window-field-label">To</label>
    <input id="time-to" type="datetime-local" title="To (UTC assumed)">
    <button id="btn-apply-window" type="button">Apply</button>
    <!-- "Reset to unbounded" — not "Clear": unbounded is a named cut state,
         not the absence of a window. -->
    <button id="btn-reset-window" type="button">Reset to unbounded</button>
  </div>

  <!-- Main layout: graph canvas + sidebar (shadow panel + detail panel). -->
  <div id="main" hidden>
    <div id="cy"></div>
    <div id="sidebar">
      <section id="shadow-panel">
        <h3>Shadow</h3>
        <div id="shadow-list"></div>
      </section>
      <section id="detail-panel">
        <h3>Element detail</h3>
        <div id="detail-content">
          <p class="detail-placeholder">Click a node to see its traces.</p>
        </div>
      </section>
    </div>
  </div>

  <script src="/lib/cytoscape.min.js"></script>
  <script src="/render.js"></script>
  <script src="/export.js"></script>
  <script src="/app.js"></script>
</body>
</html>
